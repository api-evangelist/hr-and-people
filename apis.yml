common:
- type: APIEvangelistTopic
  url: https://github.com/api-evangelist/hr-and-people
- type: JSONSchema
  url: json-schema/hr-and-people-employee-schema.json
- type: JSONSchema
  url: json-schema/hr-and-people-employment-schema.json
- type: JSONStructure
  url: json-structure/hr-and-people-employee-structure.json
- type: JSONLD
  url: json-ld/hr-and-people-context.jsonld
- type: Vocabulary
  url: vocabulary/hr-and-people-vocabulary.yml
- type: Example
  url: examples/hr-and-people-employee-example.json
- type: Example
  url: examples/hr-and-people-employment-example.json
- type: Features
  data:
  - name: Employee Record Schema
    description: Portable JSON Schema for an Employee record covering identity, employment,
      compensation, and lifecycle fields shared across HRIS systems
  - name: Schema.org Person Alignment
    description: JSON-LD context aligning the Employee vocabulary with schema.org/Person and
      schema.org/EmployeeRole for linked-data interoperability
  - name: HR Provider Catalog
    description: Catalog of HRIS, unified HR, payroll, ATS, performance, and people-data API
      providers with links to their developer documentation
  - name: Unified HRIS Coverage
    description: Includes the major unified-HRIS API platforms (Merge, Finch, Kombo) that
      normalize employee data across dozens of underlying HRIS and payroll systems
  - name: People Operations Vocabulary
    description: Shared vocabulary mapping employee, employment, compensation, time-off,
      performance, and recruiting concepts across the HR landscape
- type: UseCases
  data:
  - name: HRIS Integration Mapping
    description: Map a customer's HRIS data into a normalized Employee record for downstream
      consumers (provisioning, analytics, compensation, security)
  - name: Talent Acquisition Pipeline
    description: Catalog ATS and recruiting APIs feeding candidate, application, offer, and
      hire data into an HRIS or data warehouse
  - name: People Data Warehouse
    description: Build a people-data warehouse keyed on the Employee schema, joining HRIS,
      payroll, performance, and engagement records
  - name: Compensation Benchmarking
    description: Combine HRIS employee/compensation records with compensation-intelligence APIs
      (Compa, OpenComp) for offer and review benchmarks
  - name: Joiner-Mover-Leaver Automation
    description: Drive identity and access lifecycle off HRIS lifecycle events (hire, transfer,
      termination) via webhooks or unified-API event streams
  - name: AI Capabilities for HR Workflows
    description: Provide governed AI capabilities (resume parsing, offer generation,
      compensation analysis, headcount planning) grounded in the Employee schema
- type: Integrations
  data:
  - name: HRIS Providers
    description: Workday, BambooHR, Rippling, Gusto, Justworks, Paylocity, ADP, UKG, Sage
      People, Personio, HiBob, Namely
  - name: Unified HRIS APIs
    description: Merge HRIS, Finch, Kombo
  - name: Applicant Tracking
    description: Greenhouse, Lever, Workable, SmartRecruiters, Ashby
  - name: Performance and Engagement
    description: Lattice, Culture Amp, 15Five
  - name: People Data and Compensation
    description: LinkedIn Talent Solutions, HiPeople, Compa, OpenComp
