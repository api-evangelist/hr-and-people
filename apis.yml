description: API and integration profile for the HR and people-operations landscape. This topic
  repo catalogs the API surface of HRIS systems, unified HR APIs, payroll providers, talent
  acquisition platforms, performance and engagement tools, and people-data services. The focus
  is a portable Employee record schema (JSON Schema), schema.org/Person aligned semantics
  (JSON-LD), and a shared vocabulary for the people-operations domain.
